	}
.leaflet-tooltip-top:before,
.leaflet-tooltip-bottom:before,
.leaflet-tooltip-left:before,
.leaflet-tooltip-right:before {
	position: absolute;
	pointer-events: none;
	border: 6px solid transparent;
	background: transparent;
	content: "";
	}

/* Directions */

.leaflet-tooltip-bottom {
	margin-top: 6px;
}
.leaflet-tooltip-top {
	margin-top: -6px;
}
.leaflet-tooltip-bottom:before,
.leaflet-tooltip-top:before {
	left: 50%;
	margin-left: -6px;
	}
.leaflet-tooltip-top:before {
	bottom: 0;
	margin-bottom: -12px;
	border-top-color: #fff;
	}
.leaflet-tooltip-bottom:before {
	top: 0;
	margin-top: -12px;
	margin-left: -6px;
	border-bottom-color: #fff;
	}
.leaflet-tooltip-left {
	margin-left: -6px;
}
.leaflet-tooltip-right {
	margin-left: 6px;
}
.leaflet-tooltip-left:before,
.leaflet-tooltip-right:before {
	top: 50%;
	margin-top: -6px;
	}
.leaflet-tooltip-left:before {
	right: 0;
	margin-right: -12px;
	border-left-color: #fff;
	}
.leaflet-tooltip-right:before {
	left: 0;
	margin-left: -12px;
	border-right-color: #fff;
	}

/* Printing — briefing sheets & operation summaries */

#print-sheet { display: none; }

@media print {
  /* Prevent printers from removing background-images of controls. */
  .leaflet-control {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body.printing > *:not(#print-sheet) { display: none !important; }
  body.printing #print-sheet { display: block !important; }

  .print-page {
    font-family: Georgia, 'Times New Roman', serif;
    color: #000; background: #fff; padding: 0.4in;
    font-size: 11pt; line-height: 1.4;
  }
  .print-header { border-bottom: 2px solid #000; padding-bottom: 8px; margin-bottom: 14px; }
  .print-title { font-size: 18pt; font-weight: 700; letter-spacing: 0.03em; }
  .print-sub { font-size: 10pt; color: #444; margin-top: 2px; }
  .print-section-title {
    font-size: 12pt; font-weight: 700; margin: 16px 0 6px;
    border-bottom: 1px solid #999; padding-bottom: 2px;
  }
  .print-table { width: 100%; border-collapse: collapse; margin-bottom: 4px; }
  .print-table th, .print-table td {
    border: 1px solid #999; padding: 4px 8px; text-align: left; font-size: 10pt;
  }
  .print-table th { background: #eee; font-weight: 700; width: 28%; }
  .print-table tr:first-child th { width: auto; background: #ddd; }
  .print-notes { font-size: 10pt; padding: 4px 0; }
  .print-blank-lines {
    border-bottom: 1px solid #999; height: 22px; margin-bottom: 8px;
  }
  .print-footer {
    margin-top: 24px; padding-top: 8px; border-top: 1px solid #999;
    font-size: 9pt; color: #666; text-align: center;
  }
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{

}

  --orange:#c45d0a;--cyan:#0969a4;--green:#1a7f37;

}
#hdr{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}

.logo span{color:var(--cyan)}
.tagline{font-size:12px;color:var(--muted);flex:1}
.hbtn{font-family:monospace;font-size:13px;padding:6px 12px;border-radius:6px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;white-space:nowrap}
#sar-btn{border-color:var(--red);color:var(--red)}
#sar-btn.on{background:var(--red);color:#fff}
#sbar{background:var(--panel);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
#cs{font-family:monospace;font-size:16px;background:var(--input-bg);border:1.5px solid var(--border);color:var(--text);padding:8px 12px;border-radius:7px;width:160px;text-transform:uppercase;outline:none}
#cs:focus{border-color:var(--orange)}
.btn{font-family:monospace;font-size:14px;font-weight:600;padding:8px 14px;border-radius:7px;border:none;cursor:pointer;white-space:nowrap}
.bp{background:var(--orange);color:#000}
.bg{background:transparent;border:1.5px solid var(--border);color:var(--muted)}
.bc{background:transparent;border:1.5px solid var(--cyan);color:var(--cyan)}
.bgn{background:transparent;border:1.5px solid var(--green);color:var(--green)}
#stbar{margin-left:auto;display:flex;align-items:center;gap:6px;font-family:monospace;font-size:12px;color:var(--muted);white-space:nowrap}
#sdot{width:9px;height:9px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
#sdot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
#sdot.err{background:var(--red);box-shadow:0 0 6px var(--red)}
#sdot.busy{background:var(--yellow);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#main{display:flex;flex:1;min-height:0;overflow:hidden}
#mapwrap{flex:1;position:relative;min-height:0;min-width:0}
#map{position:absolute;top:0;left:0;right:0;bottom:0}
.leaflet-container{background:#1a1f2e!important}
#mctrl{position:absolute;top:10px;left:10px;z-index:400;display:flex;flex-direction:column;gap:6px}
.mbtn{width:38px;height:38px;background:var(--panel);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
#layer-picker{display:none;position:absolute;top:10px;left:56px;z-index:400;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:6px;box-shadow:var(--shadow);flex-direction:column;gap:3px;min-width:120px}
#layer-picker.on{display:flex}
.maplayer-btn{display:flex;align-items:center;gap:8px;padding:7px 10px;background:transparent;border:none;border-radius:5px;color:var(--text);font-size:13px;text-align:left;cursor:pointer;white-space:nowrap}

#map-fullscreen-btn{position:absolute;top:10px;left:10px;z-index:450;background:#1a1a1a;border:2px solid #555;border-radius:6px;padding:6px 10px;cursor:pointer;font-size:14px;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.8);font-weight:700;line-height:1}

body.light #map-fullscreen-btn:hover{background:#f0f0f0}
body.map-fs #sidebar{display:none!important}
body.map-fs #map{position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;z-index:900!important}
body.map-fs #map-fullscreen-btn{z-index:1000;top:12px;left:12px}
#map-wx-hud{display:none;position:fixed;bottom:36px;right:12px;z-index:1000;

body.light #map-wx-hud{background:rgba(255,255,255,0.88);color:#1a1a1a;
  border-color:rgba(0,0,0,0.2)}
/* Forecast accordion */
.fc-day{border:1px solid var(--border);border-radius:7px;margin-bottom:6px;overflow:hidden}
.fc-day-hdr{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;background:var(--card-bg);user-select:none}

.fc-arrow{margin-left:auto;font-size:10px;color:var(--muted);transition:transform .2s}
.fc-day-hdr.open .fc-arrow{transform:rotate(90deg)}
.fc-day-body{display:none;padding:8px 12px;border-top:1px solid var(--border)}

.fc-period{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}

.fc-p-label{font-size:11px;color:var(--muted);width:70px}
.fc-p-detail{font-size:12px;font-family:monospace}
.fc-nws{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5;padding:6px 8px;background:var(--card-bg);border-radius:5px}
/* Wind rose */
.wind-rose-wrap{display:flex;align-items:center;gap:16px;padding:12px 16px;background:var(--card-bg);border:1px solid var(--border);border-radius:7px;margin-top:8px}
.wind-rose-stats{font-family:monospace}
.wind-rose-spd{font-size:22px;font-weight:700;margin-bottom:2px}
.wind-rose-dir{font-size:13px}
.wind-rose-gust{font-size:11px;color:var(--muted);margin-top:4px}
/* Force Leaflet controls to always be visible regardless of map tile darkness */
.leaflet-control-zoom a{background:#1a1a1a!important;color:#fff!important;border-color:#555!important}
.leaflet-control-zoom a:hover{background:#333!important}
body.light .leaflet-control-zoom a{background:#fff!important;color:#333!important;border-color:#ccc!important}
body.light .leaflet-control-zoom a:hover{background:#f4f4f4!important}
.leaflet-control-attribution{background:rgba(0,0,0,0.6)!important;color:#ccc!important}
body.light .leaflet-control-attribution{background:rgba(255,255,255,0.8)!important;color:#333!important}
.leaflet-bar{border:2px solid #555!important;box-shadow:0 2px 8px rgba(0,0,0,.8)!important}
body.light .leaflet-bar{border:1px solid #ccc!important;box-shadow:0 2px 4px rgba(0,0,0,.2)!important}
#legend{position:absolute;bottom:24px;left:10px;z-index:400;background:rgba(22,27,34,.9);border:1px solid var(--border);border-radius:7px;padding:8px 12px;font-family:monospace;font-size:11px}
body.light #legend{background:rgba(255,255,255,.92)}
.lg{display:flex;align-items:center;gap:7px;color:var(--muted);margin-bottom:3px}
.lg:last-child{margin-bottom:0}
.ld{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#sarp{display:none;position:absolute;top:10px;right:10px;z-index:400;width:200px;background:var(--panel);border:1.5px solid var(--red);border-radius:8px;padding:12px;box-shadow:var(--shadow)}
#sarp.on{display:block}
#sarp h3{font-family:monospace;font-size:12px;color:var(--red);margin-bottom:8px}

.sr:last-child{border-bottom:none}
.sk{color:var(--muted)}.sv{color:var(--text)}
#det{display:none;position:absolute;bottom:16px;left:50%;transform:translateX(-50%);width:min(460px,94vw);background:var(--panel);border:1.5px solid var(--orange);border-radius:10px;padding:16px 18px;z-index:500;box-shadow:var(--shadow)}
#det.on{display:block}
#dclose{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.dk{font-family:monospace;font-size:11px;color:var(--muted)}
.dv{font-family:monospace;font-size:13px;color:var(--text);word-break:break-all}
#sidebar{width:300px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
#tcont{flex:1;overflow-y:auto;padding:10px;-webkit-overflow-scrolling:touch}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:7px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
.card:active{opacity:.8}
.card.sel{border-color:var(--orange)}
.cc{font-family:monospace;font-size:14px;font-weight:700;color:var(--orange)}
.cn{font-size:13px;color:var(--muted);margin:3px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cm{font-family:monospace;font-size:12px;color:var(--muted);display:flex;gap:10px}
.cm span{color:var(--text)}
.badge{font-family:monospace;font-size:10px;padding:1px 7px;border-radius:4px;margin-left:5px;vertical-align:middle}
#bs{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1.5px solid var(--border);border-radius:14px 14px 0 0;z-index:600;padding:16px;box-shadow:0 -4px 24px rgba(0,0,0,.4);max-height:65vh;overflow-y:auto}
#bs.on{display:block}
#bsh{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
#bsclose{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
#mtabs{display:none;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0}
@media(max-width:600px){#sidebar{display:none}#mtabs{display:flex}}
.mtab{flex:1;padding:8px 4px;font-family:monospace;font-size:11px;background:none;border:none;border-top:2.5px solid transparent;color:var(--muted);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--border);padding:10px 20px;border-radius:8px;font-family:monospace;font-size:13px;color:var(--text);z-index:1000;box-shadow:var(--shadow);opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}

.radar-legend-ctrl{background:rgba(13,17,23,.92);border:1px solid #30363d;border-radius:6px;padding:6px 8px;color:var(--text)}

.radar-legend-ctrl .rl-row{display:flex;align-items:center;gap:4px;height:14px}
.radar-legend-ctrl .rl-swatch{width:16px;height:10px;border-radius:2px;flex-shrink:0}

/* ════════════════════════════════════════════════════════
   SAR TOOLKIT — additional styles
   ════════════════════════════════════════════════════════ */

/* ── Wider sidebar to fit SAR tools ── */
#sidebar{width:340px}

/* ── Tab bar: dropdown menu ── */
#tabbar{position:relative;border-bottom:1px solid var(--border);flex-shrink:0}
#tab-dropdown-trigger{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;background:var(--panel);border:none;cursor:pointer;
  font-family:monospace;font-size:13px;font-weight:600;letter-spacing:.04em;
  color:var(--orange);touch-action:manipulation;
}
#tab-dropdown-trigger:hover{background:var(--card-bg)}
#tab-dropdown-caret{color:var(--muted);font-size:11px;transition:transform .15s}
#tab-dropdown-trigger.open #tab-dropdown-caret{transform:rotate(180deg);color:var(--orange)}
#tab-dropdown-panel{
  display:none;position:absolute;top:100%;left:0;right:0;z-index:500;
  background:var(--panel);border:1px solid var(--border);border-top:none;
  max-height:min(420px,70vh);overflow-y:auto;box-shadow:var(--shadow);
}
#tab-dropdown-panel.open{display:block}
.tab-item{
  display:block;width:100%;text-align:left;padding:10px 14px;
  background:none;border:none;border-left:3px solid transparent;
  font-family:monospace;font-size:12px;letter-spacing:.03em;
  color:var(--text);cursor:pointer;touch-action:manipulation;
}
.tab-item:hover{background:var(--card-bg)}
.tab-item.on{color:var(--orange);border-left-color:var(--orange);background:var(--card-bg)}
.tab-item-group{
  padding:8px 14px 4px;font-size:10px;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;border-top:1px solid var(--border);margin-top:4px;
}
.tab-item-group:first-child{border-top:none;margin-top:0}

/* ── Section headers inside tab panels ── */
.sec-h{
  font-family:monospace;font-size:11px;color:var(--cyan);
  letter-spacing:.06em;margin:14px 0 8px;text-transform:uppercase;
}
.sec-h:first-child{margin-top:0}

/* ── Form elements ── */
.field{margin-bottom:10px}
.flabel{font-family:monospace;font-size:11px;color:var(--muted);margin-bottom:4px;display:block}
.finput, .fselect, .ftextarea{
  width:100%;font-family:monospace;font-size:13px;
  background:var(--input-bg);border:1.5px solid var(--border);
  color:var(--text);padding:7px 10px;border-radius:6px;outline:none;
  font-family:inherit;
}
.finput:focus, .fselect:focus, .ftextarea:focus{border-color:var(--orange)}
.ftextarea{resize:vertical;min-height:54px;font-family:monospace}
.frow{display:flex;gap:8px}
.frow > *{flex:1}

/* ── Small action buttons ── */
.sbtn{
  font-family:monospace;font-size:12px;font-weight:600;
  padding:7px 12px;border-radius:6px;border:1.5px solid var(--border);
  background:transparent;color:var(--text);cursor:pointer;white-space:nowrap;
}
.sbtn:active{opacity:.7}
.sbtn-primary{background:var(--orange);border-color:var(--orange);color:#000}
.sbtn-red{border-color:var(--red);color:var(--red)}
.sbtn-green{border-color:var(--green);color:var(--green)}
.sbtn-cyan{border-color:var(--cyan);color:var(--cyan)}
.sbtn-full{width:100%}

/* ── Result / output boxes ── */
.result-box{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:7px;padding:10px 12px;margin-top:8px;
  font-family:monospace;font-size:13px;color:var(--text);
}
.result-box .rk{color:var(--muted);font-size:11px}
.result-box .rv{color:var(--orange);font-size:14px;font-weight:700}

/* ── Subject cards (multi-subject tracking) ── */
.subj-card{
  background:var(--card-bg);border-left:4px solid var(--border);
  border-radius:0 7px 7px 0;padding:10px 12px;margin-bottom:8px;
}
.subj-head{display:flex;align-items:center;justify-content:space-between}
.subj-name{font-family:monospace;font-size:13px;font-weight:700}
.subj-status{font-family:monospace;font-size:10px;padding:2px 7px;border-radius:4px}
.st-active{background:#1f3a2e;color:#3fb950}
.st-lost{background:#3a1f1f;color:#f85149}
.st-found{background:#1a2740;color:#39d0d8}
.st-standby{background:#1e2430;color:#8b949e}
.subj-meta{font-size:12px;color:var(--muted);margin-top:4px}
.subj-actions{display:flex;gap:6px;margin-top:8px}
.color-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}

/* ── Sector cards ── */
.sector-card{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:7px;padding:10px 12px;margin-bottom:8px;
}
.sector-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sector-name{font-family:monospace;font-size:13px;font-weight:700;color:var(--orange)}
.sector-status{font-family:monospace;font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer}
.ss-unsearched{background:#3a1f1f;color:#f85149}
.ss-progress{background:#3a2f1f;color:#e3b341}
.ss-cleared{background:#1f3a2e;color:#3fb950}

/* ── Roster cards ── */
.roster-card{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:7px;padding:10px 12px;margin-bottom:8px;
}
.roster-head{display:flex;align-items:center;justify-content:space-between}
.roster-name{font-family:monospace;font-size:13px;font-weight:700}
.rst-staged{background:#1e2430;color:#8b949e}
.rst-deployed{background:#1a2740;color:#39d0d8}
.rst-returned{background:#1f3a2e;color:#3fb950}

/* ── Log entries ── */
.log-entry{
  border-left:3px solid var(--border);padding:6px 10px;margin-bottom:6px;
  font-size:12px;
}
.log-entry.auto{border-left-color:var(--cyan)}
.log-entry.manual{border-left-color:var(--orange)}
.log-time{font-family:monospace;font-size:10px;color:var(--muted)}
.log-text{color:var(--text);margin-top:2px}

/* ── Map measurement overlay ── */
#measure-info{
  position:absolute;top:10px;left:56px;z-index:400;
  background:var(--panel);border:1px solid var(--border);
  border-radius:7px;padding:6px 12px;font-family:monospace;font-size:12px;
  display:none;box-shadow:var(--shadow);
}
#measure-info.on{display:block}

/* ── Coordinate display under cursor ── */
#coord-display{
  position:absolute;bottom:24px;right:10px;z-index:400;
  background:rgba(22,27,34,.9);border:1px solid var(--border);
  border-radius:6px;padding:5px 10px;font-family:monospace;font-size:11px;
  color:var(--muted);
}
body.light #coord-display{background:rgba(255,255,255,.92)}

/* ── Mode toolbar (waypoint/sector drawing) ── */
#draw-toolbar{
  position:absolute;top:10px;left:56px;z-index:400;
  display:flex;gap:6px;flex-wrap:wrap;max-width:60%;
}
.draw-btn{
  font-family:monospace;font-size:11px;padding:6px 10px;
  border-radius:6px;border:1px solid var(--border);background:var(--panel);
  color:var(--muted);cursor:pointer;box-shadow:var(--shadow);white-space:nowrap;
}
.draw-btn.on{background:var(--orange);color:#000;border-color:var(--orange)}

/* ── Subject color picker swatches ── */
.swatches{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent}
.swatch.sel{border-color:var(--text)}

/* ── Empty states reuse .empty from base ── */

/* ── Scrollable tool sub-sections ── */
.tool-divider{height:1px;background:var(--border);margin:14px 0}

</style>
</head>

// ── APRS Station History Playback ────────────────────────────────────
async function loadStationHistory(callsign) {
  if (!callsign) return;
  try {
    var entries = await aprsGet({ name: callsign, what: 'loc', howmany: 100 });
    if (!entries.length) { toast('No history found for ' + callsign); return; }
    historyData = entries.filter(function(e){ return e.lat && e.lng; })
      .sort(function(a,b){ return (a.lasttime||0) - (b.lasttime||0); });
    if (historyData.length < 2) { toast('Not enough history points'); return; }
    historyIdx = 0;
    if (historyLayer) { map.removeLayer(historyLayer); historyLayer = null; }
    if (historyTimer) { clearInterval(historyTimer); historyTimer = null; }
    // Draw full path as polyline
    var latlngs = historyData.map(function(e){ return [parseFloat(e.lat), parseFloat(e.lng)]; });
    historyLayer = L.layerGroup();
    L.polyline(latlngs, { color:'#facc15', weight:2, opacity:0.7, dashArray:'4,4' }).addTo(historyLayer);
    // Animate marker along path
    var marker = L.circleMarker(latlngs[0], { radius:7, color:'#facc15', fillColor:'#facc15', fillOpacity:0.9 });
    marker.addTo(historyLayer);
    historyLayer.addTo(map);
    map.fitBounds(L.latLngBounds(latlngs), { padding:[30,30] });
    toast('Playing ' + historyData.length + ' points for ' + callsign);
    historyTimer = setInterval(function() {
      historyIdx++;
      if (historyIdx >= historyData.length) {
        clearInterval(historyTimer); historyTimer = null;
        toast('History playback complete');
        return;
      }
      var pt = latlngs[historyIdx];
      marker.setLatLng(pt);
      var e = historyData[historyIdx];
      var t = e.lasttime ? new Date(e.lasttime * 1000).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
      marker.bindTooltip(callsign + (t ? ' @ ' + t : ''), { permanent:false });
    }, 800);
  } catch(err) { toast('History error: ' + err.message); }
}

function stopHistoryPlayback() {
  if (historyTimer) { clearInterval(historyTimer); historyTimer = null; }
  if (historyLayer) { map.removeLayer(historyLayer); historyLayer = null; }
  historyData = []; historyIdx = 0;
}

// ── PHG Coverage Circles ─────────────────────────────────────────────
function parsePHG(comment) {
  var m = comment && comment.match(/PHG(\d)(\d)(\d)(\d)/);
  if (!m) return null;
  var power  = [0,1,4,9,16,25,36,49,64,81][parseInt(m[1])] || 0; // watts
  var height = Math.pow(2, parseInt(m[2])) * 10;                   // feet
  var gain   = Math.pow(10, parseInt(m[3]) / 10);                  // dBd linear
  var dir    = parseInt(m[4]) * 45;                                 // degrees
  // Range in miles: sqrt(2 * height * sqrt(power * gain / 10))
  var rangeMi = Math.sqrt(2 * height * Math.sqrt(power * gain / 10));
  return { rangeMi: rangeMi, power: power, height: height, gain: parseInt(m[3]), dir: dir };
}

function togglePHGCircles() {
  if (phgLayer) { map.removeLayer(phgLayer); phgLayer = null; toast('PHG circles off'); return; }
  phgLayer = L.layerGroup();
  var count = 0;
  stations.forEach(function(s) {
    var phg = parsePHG(s.comment || '');
    if (!phg || !s.lat || !s.lng) return;
    var radiusM = phg.rangeMi * 1609.34;
    L.circle([parseFloat(s.lat), parseFloat(s.lng)], {
      radius: radiusM, color:'#a78bfa', fillColor:'#a78bfa',
      fillOpacity: 0.05, weight: 1.5, dashArray:'5,5'
    }).bindTooltip(htmlEscape(s.name) + ' PHG: ' + Math.round(phg.rangeMi) + ' mi range, ' + phg.power + 'W, ' + phg.height + 'ft', { sticky:true })
      .addTo(phgLayer);
    count++;
  });
  if (!count) { phgLayer = null; toast('No PHG data in current stations'); return; }
  phgLayer.addTo(map);
  toast('Showing ' + count + ' PHG coverage circles');
}

// ── Dead Reckoning ───────────────────────────────────────────────────
function showDeadReckoning(station) {
  if (!station || !station.lat || !station.lng) return;
  var speed  = parseFloat(station.speed  || 0); // knots
  var course = parseFloat(station.course || 0); // degrees
  var lastT  = parseInt(station.lasttime || 0);
  if (speed < 1 || !lastT) { toast('No speed/course data for dead reckoning'); return; }
  var ageMin = (Date.now() / 1000 - lastT) / 60;
  if (ageMin > 120) { toast('Last position too old for dead reckoning (>' + Math.round(ageMin) + ' min)'); return; }
  var speedMps = speed * 0.514444; // knots to m/s
  var distM    = speedMps * ageMin * 60;
  var rad      = course * Math.PI / 180;
  var dLat     = (distM / 111111) * Math.cos(rad);
  var dLon     = (distM / (111111 * Math.cos(parseFloat(station.lat) * Math.PI / 180))) * Math.sin(rad);
  var predLat  = parseFloat(station.lat) + dLat;
  var predLon  = parseFloat(station.lng) + dLon;
  if (drLayer) { map.removeLayer(drLayer); drLayer = null; }
  drLayer = L.layerGroup();
  L.polyline([[parseFloat(station.lat), parseFloat(station.lng)], [predLat, predLon]],
    { color:'#fb923c', weight:2, dashArray:'6,4', opacity:0.8 }).addTo(drLayer);
  L.circleMarker([predLat, predLon], { radius:8, color:'#fb923c', fillColor:'#fb923c', fillOpacity:0.6 })
    .bindTooltip('DR: ' + htmlEscape(station.name) + '<br>' + Math.round(ageMin) + ' min, ' + Math.round(speed) + ' kn @ ' + Math.round(course) + '°', { permanent:true })
    .addTo(drLayer);
  drLayer.addTo(map);
  map.panTo([predLat, predLon]);
}

// ── Heard List ───────────────────────────────────────────────────────
function heardListHTML() {
  if (!stations.length) return '<div class="empty">No stations loaded</div>';
  var sorted = stations.slice().sort(function(a,b){ return (b.lasttime||0) - (a.lasttime||0); });
  var rows = sorted.slice(0, 50).map(function(s) {
    var age = s.lasttime ? ago(Date.now()/1000 - s.lasttime) : '?';
    var path = s.path || '';
    return '<div class="result-box" style="padding:6px 10px;cursor:pointer" onclick="focusStation(' + JSON.stringify(s.name) + ')">'
      + '<div style="display:flex;justify-content:space-between;align-items:center">'
      + '<span style="font-family:monospace;font-weight:600;font-size:13px">' + htmlEscape(s.name) + '</span>'
      + '<span style="font-size:11px;color:var(--muted)">' + age + '</span>'
      + '</div>'
      + (path ? '<div style="font-size:10px;color:var(--muted);margin-top:2px">via ' + htmlEscape(path) + '</div>' : '')
      + '</div>';
  }).join('');
  return '<div class="sec-h">Heard List (' + Math.min(stations.length, 50) + '/' + stations.length + ')</div>' + rows;
}

function focusStation(name) {
  var s = stations.find(function(st){ return st.name === name; });
  if (!s) return;
  map.setView([parseFloat(s.lat), parseFloat(s.lng)], 13);
  openDet(s);
}

function initMap() {
  map = L.map('map', { center:[39.7684,-86.1581], zoom:7, zoomControl:false });

  // Base map layers. These hit the tile providers directly (not through
  // the local tile_cache proxy) so the map always has a working source
  // even if that proxy isn't running -- a single point of failure there
  // previously meant a fully blank map with zero fallback. The OFFLINE
  // tab's pre-download feature still uses the cache; this is just about
  // what's shown live.
  // Street layer: Esri World Street Map -- same CDN-backed infrastructure
  // as Satellite, Topo, and Nat Geo. No API key, readable in both light
  // and dark mode (unlike CartoCDN's dark_all which was unreadable in dark
  // mode and required a separate URL swap on theme toggle).
  var darkLayer = L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    { attribution: '&copy; OpenStreetMap contributors &copy; CartoDB', maxZoom:19, maxNativeZoom:19, subdomains:'abcd', r:'' }
  );
  var streetLayer = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',
    { attribution: '&copy; Esri, HERE, Garmin, &copy; OpenStreetMap contributors', maxZoom:19 }
  );
  var topoLayer = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}',
    {
      attribution: '&copy; Esri, HERE, Garmin, FAO, NOAA, USGS, &copy; OpenStreetMap contributors',
      maxZoom:19
      // Switched from OpenTopoMap to Esri's World Topo Map: OpenTopoMap's
      // tile server has a documented history of returning bad/blank
      // tiles at zoom 16-17 (multiple independent reports), which is
      // what caused this layer to not load correctly. Esri's service is
      // the same CDN-backed infrastructure already proven reliable here
      // for the Satellite and Nat Geo layers.
    }
  );
  var satelliteLayer = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    { attribution: 'Imagery &copy; Esri, Maxar, Earthstar Geographics', maxZoom:19 }
  );
  var natGeoLayer = L.tileLayer(
    'https://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}',
    { attribution: '&copy; National Geographic, Esri, DeLorme, NAVTEQ', maxZoom:16 }
  );

  baseTileLayer = natGeoLayer;
  currentBaseLayerName = 'natgeo';
  baseLayers = { dark: darkLayer, street: streetLayer, topo: topoLayer, satellite: satelliteLayer, natgeo: natGeoLayer };
  baseTileLayer.addTo(map);

  L.control.zoom({ position:'topright' }).addTo(map);
  map.on('click', function(e) {
    closeLayerPicker();
    if (typeof pickMapMode !== 'undefined' && pickMapMode) {
      pickMapMode = false;
      setMyLocation(e.latlng.lat, e.latlng.lng);
      return;
    }
    if (!handleMapClickForTools(e)) closeDet();
  });
  initCoordDisplay();
  console.log('Map initialized OK');
}

function updateMapWxHUD() {
  var el = document.getElementById('map-wx-hud');
  if (!el) return;
  if (!weatherData || !weatherData.current) {
    el.innerHTML = '&#9925; --';
    return;
  }
  var c = weatherData.current;
  var compass = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  var wdir = compass[Math.round((c.wind_direction_10m||0) / 22.5) % 16];
  var clr = (c.wind_speed_10m||0) < 5 ? '#4ade80' : (c.wind_speed_10m||0) < 15 ? '#facc15' : (c.wind_speed_10m||0) < 25 ? '#fb923c' : '#f87171';
  el.innerHTML =
    '<div style="font-size:20px;text-align:center">' + wmoIcon(c.weather_code) + '</div>'
    + '<div style="font-size:16px;font-weight:700;text-align:center">' + Math.round(c.temperature_2m) + '\u00B0F'
    + ' <span style="font-size:11px;opacity:0.7">feels ' + Math.round(c.apparent_temperature) + '\u00B0</span></div>'
    + '<div style="font-size:11px;opacity:0.8;text-align:center">' + wmoDesc(c.weather_code) + '</div>'
    + '<div style="margin-top:6px;font-size:12px;color:' + clr + '">'
    + '&#127756; ' + Math.round(c.wind_speed_10m||0) + ' mph ' + wdir
    + (c.wind_gusts_10m > (c.wind_speed_10m||0) + 3 ? ' <span style="opacity:0.7">gusts ' + Math.round(c.wind_gusts_10m) + '</span>' : '')
    + '</div>';
}

function ago(ts) {
  if (!ts) return '--';
  var d = Math.floor(Date.now()/1000) - parseInt(ts);
  if (d < 60)    return d + 's ago';
  if (d < 3600)  return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  return Math.floor(d/86400) + 'd ago';
}

function mph(k)  { return k ? (parseFloat(k)*1.15078).toFixed(1) : null; }
function ft(m)   { return m ? (parseFloat(m)*3.28084).toFixed(0)  : null; }

function symType(s) {
  if (!s) return 'fixed';
  if (s === 'MESHTASTIC' || s === 'MESHCORE') return 'mesh';
  if (s.indexOf('_') >= 0 || s.indexOf('@') >= 0) return 'wx';
  if (s.indexOf('>') >= 0 || s.indexOf('k') >= 0 || s.indexOf('u') >= 0) return 'mobile';
  if (s.indexOf('&') >= 0) return 'digi';
  return 'fixed';
}

function symColor(t, isT) {
  if (isT) return '#3fb950';
  var c = { mobile:'#f0821e', fixed:'#39d0d8', wx:'#e3b341', digi:'#c792ea', mesh:'#ff7eb6' };
  return c[t] || '#8b949e';
}

function badgeH(sym) {
  var t = symType(sym);
  var bgs  = { mobile:'#1f3a2e', fixed:'#1e2430', wx:'#1a2740', digi:'#2a1f3a', mesh:'#3a1f2e' };
  var fgs  = { mobile:'#3fb950', fixed:'#8b949e', wx:'#39d0d8', digi:'#c792ea', mesh:'#ff7eb6' };
  var lbls = { mobile:'MOBILE',  fixed:'FIXED',   wx:'WX',      digi:'DIGI',    mesh:'MESH'     };
  return '<span class="badge" style="background:' + (bgs[t]||bgs.fixed) + ';color:' + (fgs[t]||fgs.fixed) + '">' + (lbls[t]||'FIXED') + '</span>';
}

async function aprsGet(p) {
  var qs = new URLSearchParams(Object.assign({}, p, { format:'json', apikey:APIKEY }));
  var r  = await fetch(APIBASE + '?' + qs);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  var d = await r.json();
  if (d.result !== 'ok') throw new Error(d.description || 'API error');
  return d.entries || [];
}

function placeMark(st, isT) {
  var lat = parseFloat(st.lat), lon = parseFloat(st.lng);
  if (isNaN(lat) || isNaN(lon)) return;
  var t   = symType(st.symbol);
  var col = symColor(t, isT);
  if (markers[st.name]) map.removeLayer(markers[st.name]);
  var m = L.circleMarker([lat,lon], {
    radius: isT ? 11 : 7,
    color: col, weight: isT ? 2.5 : 1.5,
    fillColor: col, fillOpacity: 0.9
  }).addTo(map);
  if (showLbl) {
    m.bindTooltip(htmlEscape(st.name), { permanent:true, direction:'right', offset:[9,0], className:'aprs-label' });
  }
  m.on('click', function(e) {
    L.DomEvent.stopPropagation(e);
    openDet(st);
    if (window.innerWidth <= 600) showBs(detHTML(st));
  });
  markers[st.name] = m;
}

function mergeStations(entries, trk) {
  entries.forEach(function(e) {
    var i = stations.findIndex(function(s) { return s.name === e.name; });
    if (i >= 0) stations[i] = e; else stations.push(e);
    placeMark(e, e.name === trk);
  });
  render();
}

async function go() {
  var cs = document.getElementById('cs').value.trim().toUpperCase();
  if (!cs) { toast('Enter a callsign first'); return; }
  if (cs.indexOf('*') >= 0 || cs.indexOf('?') >= 0) {
    toast('Wildcard search isn\'t supported by aprs.fi \u2014 enter an exact callsign');
    return;
  }

  setSt('busy', 'Querying...');
  try {
    var en = await aprsGet({ name:cs, what:'loc' });
    if (!en.length) { setSt('err','Not found'); toast('No APRS data for ' + cs); return; }
    // Stop area loading when we start tracking a specific callsign
    if (areaLoadTimer) { clearInterval(areaLoadTimer); areaLoadTimer = null; }
    tracked = cs;
    mergeStations(en, cs);
    var st = en[0];
    map.setView([parseFloat(st.lat), parseFloat(st.lng)], 12);
    openDet(st);
    setSt('ok', 'Tracking ' + cs);
    updateSAR(st);
    aprsGet({ name:cs, what:'loc', howmany:50 }).then(function(t) { trail = t; drawTrail(); render(); }).catch(function(){});
    startRef();
  } catch(e) { setSt('err','Error'); toast('Error: ' + e.message); }
}

function geoMe() {
  if (!navigator.geolocation) { toast('GPS not available'); return; }
  setSt('busy','Locating...');
  navigator.geolocation.getCurrentPosition(function(pos) {
    var lat = pos.coords.latitude, lon = pos.coords.longitude;
    var acc = pos.coords.accuracy;
    if (myMark) map.removeLayer(myMark);
    myMark = L.circleMarker([lat,lon], {
      radius:9, color:'#fff', weight:2, fillColor:'#f0821e', fillOpacity:1
    }).addTo(map).bindTooltip('YOU', { className:'aprs-label' });
    map.setView([lat,lon], 11);
    setSt('ok','GPS fix');
    var accMi = acc ? (acc/1609.34).toFixed(1) : '?';
    toast('Located: ' + lat.toFixed(4) + ', ' + lon.toFixed(4) + ' (\u00B1' + accMi + ' mi). Wrong? Use \u{1F4CD} Set.', 6000);
  }, function(err) { setSt('err','No GPS'); toast('GPS: ' + err.message + ' \u2014 try \u{1F4CD} Set instead'); },
  { enableHighAccuracy:true, timeout:10000 });
}

// ── Manual location override ───────────────────────────────
var pickMapMode = false;

function openSetLocation() {
  document.getElementById('setloc-modal').style.display = 'block';
  document.getElementById('setloc-status').textContent = '';
  document.getElementById('setloc-input').focus();
}
function closeSetLocation() {
  document.getElementById('setloc-modal').style.display = 'none';
  pickMapMode = false;
}
function pickOnMapMode() {
  pickMapMode = true;
  document.getElementById('setloc-status').textContent = 'Tap anywhere on the map to set your location\u2026';
  toast('Tap the map to set your location');
}
async function applySetLocation() {
  var raw = document.getElementById('setloc-input').value.trim();
  if (!raw) return;
  var status = document.getElementById('setloc-status');

  // Try coordinate/DMS parse first
  var parsed = parseDMS(raw);
  if (parsed) {
    setMyLocation(parsed.lat, parsed.lon);
    closeSetLocation();
    return;
  }

  // Geocode using Open-Meteo + Census API (works from file:// with no Referer)
  status.textContent = 'Searching…';
  try {
    var result = await geocodeLocation(raw);
    if (!result) {
      status.textContent = 'Not found. Try: "Indianapolis, IN" or ZIP "46201"';
      return;
    }
    setMyLocation(result.lat, result.lon);
    closeSetLocation();
  } catch(e) {
    status.textContent = 'Search failed: ' + e.message;
  }
}
function setMyLocation(lat, lon) {
  if (myMark) map.removeLayer(myMark);
  myMark = L.circleMarker([lat,lon], {
    radius:9, color:'#fff', weight:2, fillColor:'#3fb950', fillOpacity:1
  }).addTo(map).bindTooltip('YOU (manual)', { className:'aprs-label' });
  map.setView([lat,lon], 11);
  setSt('ok','Manual location set');
  toast('Location set: ' + lat.toFixed(4) + ', ' + lon.toFixed(4));
}


function clr() {
  tracked = ''; trail = [];
  if (trailLayer) { map.removeLayer(trailLayer); trailLayer = null; }
  document.getElementById('cs').value = '';
  if (refTimer) { clearInterval(refTimer); refTimer = null; }
  closeDet(); setSt('ok','Cleared'); render();
  startAreaLoad(); // resume area beacon polling when not tracking
}

function drawTrail() {
  if (trailLayer) { map.removeLayer(trailLayer); trailLayer = null; }
  if (!trail.length) return;
  var pts = trail
    .filter(function(p) { return !isNaN(parseFloat(p.lat)) && !isNaN(parseFloat(p.lng)); })
    .map(function(p) { return [parseFloat(p.lat), parseFloat(p.lng)]; });
  if (pts.length < 2) return;
  trailLayer = L.polyline(pts, {
    color: '#f0821e', weight: 2.5, opacity: 0.75, dashArray: '5,4'
  }).addTo(map);
}

function startRef() {
  if (refTimer) clearInterval(refTimer);
  if (areaLoadTimer) { clearInterval(areaLoadTimer); areaLoadTimer = null; }
  refTimer = setInterval(async function() {
    if (!tracked) return;
    try {
      var en = await aprsGet({ name:tracked, what:'loc' });
      if (en.length) {
        mergeStations(en, tracked);
        updateSAR(en[0]);
        if (selSt && selSt.name === tracked) openDet(en[0]);
        // Refresh trail history and redraw polyline
        aprsGet({ name:tracked, what:'loc', howmany:50 }).then(function(t) {
          trail = t; drawTrail(); render();
        }).catch(function(){});
      }
    } catch(e) {}
  }, 30000); // 30s — twice as fresh as before, catches fast-moving mobiles
}

// ── Area beacon loader ─────────────────────────────────────────────────────
// When no callsign is being tracked, periodically load nearby beacons from
// APRS-IS via the /aprs/area endpoint in the messaging backend (aprslib range
// filter r/lat/lon/km). Falls back gracefully if the backend isn't running.
var MSG_API = 'http://127.0.0.1:8733';
var areaLoadBusy = false;

async function loadAreaStations() {
  if (tracked || areaLoadBusy) return;
  areaLoadBusy = true;
  try {
    var c = map.getCenter();
    var r = await fetch(MSG_API + '/aprs/area?lat=' + c.lat.toFixed(4) + '&lon=' + c.lng.toFixed(4) + '&km=30');
    if (!r.ok) return;
    var d = await r.json();
    if (d.stations && d.stations.length) {
      mergeStations(d.stations, tracked);
      if (d.result === 'cached' || d.result === 'scanning') {
        // update status bar to show area mode
        if (!tracked) setSt('ok', 'Area beacons: ' + d.stations.length + ' heard');
      }
    }
  } catch(e) {} finally {
    areaLoadBusy = false;
  }
}

function startAreaLoad() {
  if (areaLoadTimer) clearInterval(areaLoadTimer);
  if (tracked) return; // don't start area loading if we're already tracking
  loadAreaStations(); // immediate first load
  areaLoadTimer = setInterval(function() {
    if (!tracked) loadAreaStations();
    else { clearInterval(areaLoadTimer); areaLoadTimer = null; }
  }, 60000);
}


function detHTML(st) {
  var spd = mph(st.speed), alt = ft(st.altitude);
  var isT = st.name === tracked;
  var safeName = htmlEscape(st.name);
  var isMoving = spd && parseFloat(spd) > 0;

  // Heading arrow: rotate a Unicode up-arrow by the course angle using CSS
  var headingArrow = (isMoving && st.course)
    ? '<span style="display:inline-block;transform:rotate(' + st.course + 'deg);font-size:16px;margin-left:4px;color:#3fb950">\u2191</span>'
    : '';

  return '<div style="font-family:monospace;font-size:19px;font-weight:700;color:var(--orange)">'
    + safeName + badgeH(st.symbol)
    + (isT ? '<span class="badge" style="background:#1f3a2e;color:#3fb950;margin-left:5px">LIVE</span>' : '')
    + (isMoving ? '<span class="badge" style="background:#1a2e1f;color:#56d364;margin-left:5px">\u25b6 MOVING</span>' + headingArrow : '')
    + '</div>'
    + '<div style="font-size:13px;color:var(--muted);margin:4px 0 12px">' + (st.comment ? htmlEscape(st.comment) : '') + '</div>'
    + (isT && trail.length > 1 ? '<div style="font-size:12px;color:var(--muted);margin-bottom:8px">\u25ba Trail: ' + trail.length + ' positions on map</div>' : '')
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px 16px;font-size:13px">'
    + '<div class="dk">LAT</div><div class="dv">' + parseFloat(st.lat).toFixed(5) + '</div>'
    + '<div class="dk">LON</div><div class="dv">' + parseFloat(st.lng).toFixed(5) + '</div>'
    + '<div class="dk">SPEED</div><div class="dv">' + (spd ? spd+' mph' : '--') + '</div>'
    + '<div class="dk">COURSE</div><div class="dv">' + (st.course ? st.course+'&deg;' : '--') + '</div>'
    + '<div class="dk">ALTITUDE</div><div class="dv">' + (alt ? alt+' ft' : '--') + '</div>'
    + '<div class="dk">LAST HEARD</div><div class="dv">' + ago(st.lasttime) + '</div>'
    + '<div class="dk">PATH</div><div class="dv" style="word-break:break-all">' + (st.path ? htmlEscape(st.path) : '--') + '</div>'
    + '</div>'
    + '<div style="margin-top:10px;font-size:13px"><a href="https://aprs.fi/#!call=' + encodeURIComponent(st.name) + '" target="_blank" style="color:var(--cyan);text-decoration:none">Open on aprs.fi &rarr;</a></div>'
    + '<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">'
    + '<button class="sbtn" onclick="loadStationHistory(' + JSON.stringify(st.name) + ')">&#9654; History</button>'
    + (isMoving ? '<button class="sbtn" onclick="showDeadReckoning(currentDetSt)">&#127961; Dead Reckoning</button>' : '')
    + ((st.comment && st.comment.indexOf('PHG') !== -1) ? '<button class="sbtn" onclick="togglePHGCircles()">&#128308; PHG</button>' : '')
    + '</div>';
}

function applyLpbProfile(profileName) {
  activeLpbProfile = lpbProfiles.find(function(p){ return p.name === profileName; }) || null;
  if (lpbLayer) { map.removeLayer(lpbLayer); lpbLayer = null; }
  if (!activeLpbProfile) { renderTabInto('subjects','tcont'); return; }
  // Draw search radius ring around each subject's last known position
  lpbLayer = L.layerGroup();
  var drawn = 0;
  subjects.forEach(function(s) {
    var lat = s.lastLat || null, lon = s.lastLon || null;
    if (!lat && !lon) return;
    var radiusM = activeLpbProfile.radMi * 1609.34;
    L.circle([lat, lon], {
      radius: radiusM, color:'#f97316', fillColor:'#f97316',
      fillOpacity: 0.06, weight: 2, dashArray: '6,4'
    }).bindTooltip(htmlEscape(s.name) + ' — ' + htmlEscape(activeLpbProfile.name) + ' (' + activeLpbProfile.radMi + ' mi)', { sticky:true })
      .addTo(lpbLayer);
    drawn++;
  });
  if (drawn) lpbLayer.addTo(map);
  renderTabInto('subjects','tcont');
}

function addClue(type, description, lat, lon) {

    id: uid(), type: type || 'Physical', description: description || '',

// ── Hasty Team Assignment ─────────────────────────────────────────────
function assignRosterToSector(memberId, sectorId) {
  var m = roster.find(function(r){ return r.id === memberId; });
  var s = sectors.find(function(s){ return s.id === sectorId; });
  if (!m || !s) return;
  m.sector = sectorId;
  logEvent('Assigned ' + m.name + ' to sector ' + s.name);
  saveCurrentOperation();
  renderTabInto('roster','tcont');
}

// ── POA/POD Calculator ───────────────────────────────────────────────
function calcSectorPOD(sectorId, effortHours, searchers) {
  var s = sectors.find(function(s){ return s.id === sectorId; });
  if (!s) return;
  var areaSqMi = sectorAreaKm2(s.points) * 0.386102;
  // ESW estimate based on terrain (default 50m = 0.031mi)
  var eswMi = 0.031;
  var coverageW = searchers * effortHours * (2.5 / 1) * eswMi / areaSqMi;
  var pod = 1 - Math.exp(-coverageW);
  s.pod = Math.round(pod * 100);
  s.effortHours = effortHours;
  s.searchers = searchers;
  logEvent('POD for ' + s.name + ': ' + s.pod + '% (' + effortHours + 'h, ' + searchers + ' searchers)');
  saveCurrentOperation();
  renderTabInto('search','tcont');
  return s.pod;
}

  sarOn = !sarOn;
  var b = document.getElementById('sar-btn');
  b.textContent = sarOn ? 'SAR ON' : 'SAR';
  b.classList.toggle('on', sarOn);
  document.getElementById('sarp').classList.toggle('on', sarOn);
  if (sarOn) toast('SAR Mode active');
}

function updateSAR(st) {
  if (!st) return;
  document.getElementById('sardata').innerHTML =
    '<div class="sr"><span class="sk">CALL</span><span class="sv">' + htmlEscape(st.name) + '</span></div>'
  + '<div class="sr"><span class="sk">LAT</span><span class="sv">' + parseFloat(st.lat).toFixed(4) + '</span></div>'
  + '<div class="sr"><span class="sk">LON</span><span class="sv">' + parseFloat(st.lng).toFixed(4) + '</span></div>'
  + '<div class="sr"><span class="sk">SPEED</span><span class="sv">' + (mph(st.speed) ? mph(st.speed)+' mph' : '--') + '</span></div>'
  + '<div class="sr"><span class="sk">COURSE</span><span class="sv">' + (st.course ? st.course+'&deg;' : '--') + '</span></div>'
  + '<div class="sr"><span class="sk">ALT</span><span class="sv">' + (ft(st.altitude) ? ft(st.altitude)+' ft' : '--') + '</span></div>'
  + '<div class="sr"><span class="sk">LAST</span><span class="sv">' + ago(st.lasttime) + '</span></div>';
}

function fitAll() {
  var pts = Object.values(markers).map(function(m) { return m.getLatLng(); });
  if (!pts.length) return;
  map.fitBounds(L.latLngBounds(pts).pad(0.1));
}

function toggleLabels() {
  showLbl = !showLbl;
  Object.keys(markers).forEach(function(call) {
    var m = markers[call];
    if (showLbl) m.bindTooltip(htmlEscape(call), { permanent:true, direction:'right', offset:[9,0], className:'aprs-label' });
    else m.unbindTooltip();
  });
  toast(showLbl ? 'Labels on' : 'Labels off');
}

function toggleTheme() {
  darkMode = !darkMode;
  document.body.classList.toggle('light', !darkMode);
  document.getElementById('thbtn').textContent = darkMode ? 'Light' : 'Dark';
  // All layers now use Esri (same look in light and dark theme)
  // -- CartoCDN's dark_all/light_all URL-swap removed.
}

// Single source of truth for every sidebar tab: key, display label, and
// an optional group header for visual organization in the dropdown
// (purely cosmetic -- swTab/sarTabHTML2 still just match on key).
var TAB_DEFS = [
  { group: 'Primary' },
  { key:'stations',    label:'APRS' },
  { key:'weather',     label:'Weather' },
  { key:'msg',         label:'Messages' },
  { key:'mesh',        label:'Mesh' },
  { group: 'SAR Operations' },
  { key:'subjects',    label:'Subjects' },
  { key:'search',      label:'Search' },
  { key:'sarops',      label:'SAR Ops' },
  { key:'roster',      label:'Roster' },
  { key:'operations',  label:'Operations' },
  { group: 'Tools & Data' },
  { key:'tools',       label:'Tools' },
  { key:'offline',     label:'Offline' },
  { key:'log',         label:'Log' },
  { group: 'App' },
  { key:'about',       label:'About' },
  { key:'info',        label:'Help' }
];

function tabLabel(key) {
  var def = TAB_DEFS.find(function(d){ return d.key === key; });
  return def ? def.label : key;
}

function swTab(t) {
  curTab = t;
  document.getElementById('tab-dropdown-label').textContent = tabLabel(t);
  document.getElementById('tcont').innerHTML = sarTabHTML2(t);
  closeTabDropdown();
}

function renderTabDropdownPanel() {
  var panel = document.getElementById('tab-dropdown-panel');
  if (!panel) return;
  var html = '';
  TAB_DEFS.forEach(function(d) {
    if (d.group) {
      html += '<div class="tab-item-group">' + d.group + '</div>';
    } else {
      html += '<button class="tab-item' + (d.key === curTab ? ' on' : '') + '" onclick="swTab(\'' + d.key + '\')">' + d.label + '</button>';
    }
  });
  panel.innerHTML = html;
}

function toggleTabDropdown() {
  var panel = document.getElementById('tab-dropdown-panel');
  var trigger = document.getElementById('tab-dropdown-trigger');
  if (!panel || !trigger) return;
  var opening = !panel.classList.contains('open');
  if (opening) renderTabDropdownPanel();
  panel.classList.toggle('open', opening);
  trigger.classList.toggle('open', opening);
}

function closeTabDropdown() {
  var panel = document.getElementById('tab-dropdown-panel');
  var trigger = document.getElementById('tab-dropdown-trigger');
  if (panel) panel.classList.remove('open');
  if (trigger) trigger.classList.remove('open');
}

document.addEventListener('click', function(e) {
  var tabbar = document.getElementById('tabbar');
  if (tabbar && !tabbar.contains(e.target)) closeTabDropdown();
});

function render() {
  document.getElementById('tcont').innerHTML = sarTabHTML2(curTab);
  if (curMob !== 'map') {
    document.getElementById('bscont').innerHTML = sarTabHTML2(curMob);
  }
}

function tabHTML(t) {
  if (t === 'stations') return stationsHTML();
  if (t === 'trail')    return trailHTML();
  if (t === 'sar')      return sarTabHTML();
  return infoHTML();
}

function stationsHTML() {
  if (!stations.length) {
    return '<div class="empty">No stations loaded.<br><br>'
      + (tracked ? 'Enter a callsign and tap Track.' :
        'Enter a callsign and tap <b>Track</b> to follow it, or wait — nearby APRS beacons load automatically via APRS-IS (requires the optional <code>aprslib</code> package).')
      + '</div>';
  }
  var sorted = stations.slice().sort(function(a,b) {
    return parseInt(b.lasttime||0) - parseInt(a.lasttime||0);
  });
  return sorted.map(function(st) {
    var spd = mph(st.speed);
    var isT = st.name === tracked;
    var sel = selSt && selSt.name === st.name;
    // The JSON payload is embedded inside a single-quoted HTML attribute
    // (onclick='openDet(...)'), so it must be HTML-escaped on top of its
    // own JSON escaping -- JSON.stringify alone does not protect against
    // breaking out of an HTML attribute (e.g. a literal ' or > in a
    // station name/comment). Station name/comment come from the live
    // APRS network and are not trustworthy input.
    var stJson = htmlEscape(JSON.stringify(st));
    var safeName = htmlEscape(st.name);
    return '<div class="card' + (sel?' sel':'') + '" id="c-' + safeName + '" onclick=\'openDet(' + stJson + ')\'>'
      + '<div class="cc">' + safeName + badgeH(st.symbol) + (isT ? '<span class="badge" style="background:#1f3a2e;color:#3fb950;margin-left:5px">LIVE</span>' : '') + '</div>'
      + '<div class="cn">' + (st.comment ? htmlEscape(st.comment) : '&nbsp;') + '</div>'
      + '<div class="cm"><span>' + ago(st.lasttime) + '</span>' + (spd && parseFloat(spd)>0 ? '<span>'+spd+' mph</span>' : '') + '</div>'
      + '</div>';
  }).join('');
  // Heard list + PHG button
  h += '<div class="frow" style="margin-top:10px;gap:6px">';
  h += '<button class="sbtn" onclick="renderTabInto(\'heardlist\',\'tcont\')" style="flex:1">&#128225; Heard List</button>';
  h += '<button class="sbtn ' + (phgLayer ? 'sbtn-primary' : '') + '" onclick="togglePHGCircles()" style="flex:1">&#128308; PHG</button>';
  h += '</div>';
  return h;
}

function trailHTML() {
  if (!tracked) return '<div class="empty">Track a callsign to see position history.</div>';
  if (!trail.length) return '<div class="empty">No trail data for ' + htmlEscape(tracked) + '.</div>';
  return trail.slice(0,40).map(function(pt,i) {
    return '<div class="card" style="cursor:default">'
      + '<div style="font-family:monospace;font-size:11px;color:var(--muted)">POINT ' + (i+1) + '</div>'
      + '<div style="font-family:monospace;font-size:13px;color:var(--text)">' + parseFloat(pt.lat).toFixed(5) + ', ' + parseFloat(pt.lng).toFixed(5) + '</div>'
      + '<div style="font-size:12px;color:var(--muted)">' + ago(pt.lasttime) + '</div>'
      + '</div>';
  }).join('');
}

function sarTabHTML() {
  var st = stations.find(function(s) { return s.name === tracked; });
  if (!st) return '<div class="empty">Track a callsign to populate SAR data.</div>';
  var spd = mph(st.speed), alt = ft(st.altitude);
  return '<div style="font-family:monospace;font-size:12px;color:var(--red);padding:8px 10px;background:rgba(248,81,73,.1);border:1px solid var(--red);border-radius:6px;margin-bottom:12px">SAR MODE ' + (sarOn?'ACTIVE':'STANDBY') + '</div>'
    + '<div class="card" style="cursor:default;border-color:var(--orange)">'
    + '<div style="font-family:monospace;font-size:11px;color:var(--muted);margin-bottom:6px">SUBJECT / TRACKED</div>'
    + '<div class="cc">' + htmlEscape(st.name) + '</div>'
    + '<div style="font-family:monospace;font-size:13px;color:var(--text);margin-top:6px">' + parseFloat(st.lat).toFixed(5) + ', ' + parseFloat(st.lng).toFixed(5) + '</div>'
    + '<div style="font-size:13px;color:var(--muted);margin-top:4px">Last: ' + ago(st.lasttime) + '</div>'
    + (spd ? '<div style="font-size:13px;color:var(--text)">Speed: ' + spd + ' mph &middot; Course: ' + (st.course||'--') + '&deg;</div>' : '')
    + (alt ? '<div style="font-size:13px;color:var(--text)">Altitude: ' + alt + ' ft</div>' : '')
    + '<div style="margin-top:10px;font-size:13px"><a href="https://aprs.fi/#!call=' + encodeURIComponent(st.name) + '" target="_blank" style="color:var(--cyan);text-decoration:none">Open on aprs.fi &rarr;</a></div>'
    + '</div>'

function infoHTML() {
  return '<div style="font-size:13px;color:var(--text);line-height:1.8;padding:4px">'
    + '<div style="font-family:monospace;font-size:16px;color:var(--orange);margin-bottom:4px">APRS TRACKER</div>'
    + '<div style="color:var(--muted);margin-bottom:14px;font-size:12px">APRSaR Tracker &middot; Ham radio &amp; SAR toolkit</div>'

    + '<div class="sec-h">Getting Started</div>'
    + '<div>Type a callsign at the top and tap <b>Track</b> to follow it on the map. SSIDs like <code>-9</code> are optional.</div>'

    + '<div class="sec-h" style="margin-top:16px">Map</div>'
    + '<div>The globe icon (top-left, on the map) switches between Street, Topo, Satellite, and Nat Geo map styles. The label icon toggles station name labels.</div>'

    + '<div style="margin-top:6px"><b>SEARCH</b> &mdash; draw search sectors on the map. Tap a sector\u2019s status badge to cycle Unsearched &rarr; In Progress &rarr; Cleared. Each sector has a one-tap Briefing button that generates a printable assignment sheet.</div>'
    + '<div style="margin-top:6px"><b>SAR OPS</b> &mdash; the search operation timer, LKP/PLS/IPP/Clue planning markers, the sweep-width effort estimator, and a full operation summary print sheet.</div>'
    + '<div style="margin-top:6px"><b>TOOLS</b> &mdash; coordinate conversion (DD/DMS/DDM/UTM), distance &amp; bearing, waypoint drops, and GPX/KML import-export for sharing with CalTopo, SARTopo, Garmin units, or ATAK.</div>'
    + '<div style="margin-top:6px"><b>WX</b> &mdash; current conditions and a 5-day forecast for wherever the map is centered.</div>'
    + '<div style="margin-top:6px"><b>ROSTER</b> &mdash; check in personnel. Anyone with a callsign is tracked live on the map exactly like a Subject, with manual or 60-second auto-refresh.</div>'
    + '<div style="margin-top:6px"><b>LOG</b> &mdash; a permanent, dated history of everything that happens. Key events log themselves automatically; add your own entries any time. Export to a text file or clear it when starting fresh.</div>'

    + '<div class="sec-h" style="margin-top:16px">Optional Features</div>'
    + '<div><b>MESH</b> &mdash; connect to Meshtastic (public or private MQTT broker) and/or MeshCore (USB/Serial, BLE, or Wi-Fi companion radio). Node positions merge onto the same map as APRS traffic.</div>'
    + '<div style="margin-top:6px"><b>MSG</b> &mdash; two-way APRS-IS text messaging using your own callsign. Separate from aprs.fi, which is read-only.</div>'
    + '<div style="margin-top:6px"><b>OFFLINE</b> &mdash; pre-download Street-layer map tiles for an area before heading somewhere with no signal.</div>'
    + '<div style="margin-top:6px;font-size:12px;color:var(--muted)">MESH and MSG need a few extra Python packages not bundled by default. See ABOUT for the install command.</div>'

    + '<div class="sec-h" style="margin-top:16px">More Help</div>'
    + '<div>The menu button (top-right, \u2261) has a quick-reference Help dialog and links to the GitHub repository for full documentation.</div>'

    + '<div style="margin-top:18px;font-size:11px;color:var(--muted);font-family:monospace">Robert W Donze - W7CTY &middot; 914 Communications<br>Indianapolis, IN</div>'
    + '</div>';
}

function showBs(html) {

  document.getElementById('bs').classList.add('on');
}

// ── Keyboard Shortcuts ────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  switch(e.key) {
    case 'f': case 'F': toggleMapFullscreen(); break;
    case 'r': case 'R': if (!e.ctrlKey) toggleRadarOverlay(); break;
    case 'd': case 'D': toggleTheme(); break;
    case 'Escape': if (document.body.classList.contains('map-fs')) toggleMapFullscreen();
                   else closeDet(); break;
    case '1': swTab('stations'); break;
    case '2': swTab('weather');  break;
    case '3': swTab('msg');      break;
    case '4': swTab('sarops');   break;
  }
});

// ── Night mode auto-switch by sunrise/sunset ────────────────────────
var autoThemeEnabled = false;
function checkAutoTheme() {
  if (!autoThemeEnabled || !weatherData || !weatherData.daily) return;
  var now   = Date.now();
  var sr    = weatherData.daily.sunrise && weatherData.daily.sunrise[0] ? new Date(weatherData.daily.sunrise[0]).getTime() : null;
  var ss    = weatherData.daily.sunset  && weatherData.daily.sunset[0]  ? new Date(weatherData.daily.sunset[0]).getTime()  : null;
  if (!sr || !ss) return;
  var isDay = now >= sr && now < ss;
  var isLight = document.body.classList.contains('light');
  if (isDay && !isLight)  document.body.classList.add('light');
  if (!isDay && isLight)  document.body.classList.remove('light');
}
setInterval(checkAutoTheme, 60000); // check every minute

// ── Print map view ─────────────────────────────────────────────────
function printMapView() {
  var style = '<style>body{margin:0}#sidebar,#mtabs,#tabbar,#hdr{display:none!important}#map{position:fixed!important;top:0!important;left:0!important;width:100vw!important;height:100vh!important;z-index:1!important}</style>';
  var head = document.head.innerHTML;
  var w = window.open('', '_blank', 'width=900,height=700');
  if (!w) { toast('Allow popups to print the map'); return; }
  w.document.write('<html><head>' + head + style + '</head><body>' + document.getElementById('map').outerHTML + '</body></html>');
  w.document.close();
  setTimeout(function(){ w.print(); }, 500);
}

window.addEventListener('load', function() {
  initMap();
  if (typeof initOperations === 'function') initOperations();
  if (typeof redrawOperationOnMap === 'function') redrawOperationOnMap();
  swTab('stations');
  setSt('ok', 'Ready');
  startAutoLog();
  setTimeout(autoLogCheckRecovery, 800); // after map is ready
  loadAlertContacts();
  if (typeof refreshMeshcorePorts === 'function') refreshMeshcorePorts();
  // Start loading area beacons immediately -- triggers a background APRS-IS
  // range scan; if the messaging backend (aprslib) isn't running, this
  // fails gracefully and silently.
  setTimeout(startAreaLoad, 2000); // short delay to let map settle first
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      var lat = pos.coords.latitude, lon = pos.coords.longitude;
      map.setView([lat, lon], 10);
      myMark = L.circleMarker([lat,lon], {
        radius:9, color:'#fff', weight:2, fillColor:'#f0821e', fillOpacity:1
      }).addTo(map).bindTooltip('YOU', { className:'aprs-label' });
      setSt('ok', 'Ready');
    }, function() { setSt('ok','Ready'); }, { timeout:8000 });
  }
});

<script>
/* ════════════════════════════════════════════════════════
   SAR TOOLKIT — core module
   W7CTY / 914 Communications
   ════════════════════════════════════════════════════════ */

// ════════════════════════════════════════════════════════
//  OPERATION PROFILES
// ════════════════════════════════════════════════════════
// Wraps subjects/sectors/roster/log/waypoints/SAR markers into a named,
// switchable, persisted container so a team can run separate searches
// without their data bleeding together, and can archive a closed search
// rather than losing it on the next "Clear".

var OPS_INDEX_KEY = 'aprs_tracker_operations_index_v1';
var OPS_DATA_PREFIX = 'aprs_tracker_operation_';
var currentOpId = null;
var currentOpName = 'Default';

function opsIndex() {
  try {
    var raw = localStorage.getItem(OPS_INDEX_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function saveOpsIndex(idx) {
  try { localStorage.setItem(OPS_INDEX_KEY, JSON.stringify(idx)); } catch(e) {}
}

function currentOpStateBlob() {
  return {
    subjects: subjects, sectors: sectors, roster: roster,
    incidentLog: incidentLog, waypoints: waypoints,
    sarMarkers2: sarMarkers2, clueMarkers: clueMarkers,
    clueLog: clueLog, sessionNotes: sessionNotes,
    searchStartTime: searchStartTime,
    savedAt: Date.now()
  };
}

function saveCurrentOperation() {
  if (!currentOpId) return;
  try {
    localStorage.setItem(OPS_DATA_PREFIX + currentOpId, JSON.stringify(currentOpStateBlob()));
    var idx = opsIndex();
    var entry = idx.find(function(o){ return o.id === currentOpId; });
    if (entry) {
      entry.updatedAt = Date.now();
      entry.subjectCount = subjects.length;
      entry.sectorCount = sectors.length;
      saveOpsIndex(idx);
    }
  } catch(e) { console.log('Could not save operation:', e); }
}

function clearMapLayersForOpSwitch() {
  Object.keys(subjMarkers).forEach(function(id){ if (subjMarkers[id]) map.removeLayer(subjMarkers[id]); });
  Object.keys(sectorLayers).forEach(function(id){ if (sectorLayers[id]) map.removeLayer(sectorLayers[id]); });
  Object.keys(waypointLayers).forEach(function(id){ if (waypointLayers[id]) map.removeLayer(waypointLayers[id]); });
  Object.keys(sarMarkerLayers).forEach(function(id){ if (sarMarkerLayers[id]) map.removeLayer(sarMarkerLayers[id]); });
  Object.keys(rosterMarkers).forEach(function(id){ if (rosterMarkers[id]) map.removeLayer(rosterMarkers[id]); });
  subjMarkers = {}; sectorLayers = {}; waypointLayers = {}; sarMarkerLayers = {}; rosterMarkers = {};
}

function loadOperationData(opId) {
  try {
    var raw = localStorage.getItem(OPS_DATA_PREFIX + opId);
    var blob = raw ? JSON.parse(raw) : null;
    subjects = (blob && blob.subjects) || [];
    sectors = (blob && blob.sectors) || [];
    roster = (blob && blob.roster) || [];
    incidentLog = (blob && blob.incidentLog) || [];
    waypoints = (blob && blob.waypoints) || [];
    sarMarkers2 = (blob && blob.sarMarkers2) || {};
    clueMarkers  = (blob && blob.clueMarkers)  || [];
    clueLog      = (blob && blob.clueLog)      || [];
    sessionNotes = (blob && blob.sessionNotes) || '';
    searchStartTime = (blob && blob.searchStartTime) || null;
  } catch(e) {
    subjects = []; sectors = []; roster = []; incidentLog = [];
    waypoints = []; sarMarkers2 = {}; clueMarkers = []; searchStartTime = null;
  }
}

function redrawOperationOnMap() {
  subjects.forEach(function(s){ if (s.lastLat != null) placeSubjMarker(s); });
  sectors.forEach(function(s){ drawSectorLayer(s); });
  waypoints.forEach(function(wp, i) {
    var icon = L.divIcon({
      className: '',
      html: '<div style="width:22px;height:22px;background:#f0821e;border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#000;font-family:monospace">' + (i+1) + '</div>',
      iconSize:[22,22], iconAnchor:[11,11]
    });
    var m = L.marker([wp.lat, wp.lon], { icon: icon }).addTo(map);
    m.bindTooltip(htmlEscape(wp.label), { className:'aprs-label' });
    waypointLayers[wp.id] = m;
  });
  ['lkp','pls','ipp'].forEach(function(type) {
    if (sarMarkers2[type]) {
      var e = sarMarkers2[type];
      placeSarMarkerAtSilent(type, e.lat, e.lon, e.time);
    }
  });
  clueMarkers.forEach(function(c) { placeSarMarkerAtSilent('clue', c.lat, c.lon, c.time, c.id); });
  roster.forEach(function(m){ if (m.lastLat != null) placeRosterMarker(m); });
}

function createOperation(name) {
  name = (name || '').trim() || ('Operation ' + new Date().toLocaleDateString());
  var id = uid();
  var idx = opsIndex();
  idx.unshift({ id: id, name: name, createdAt: Date.now(), updatedAt: Date.now(), subjectCount: 0, sectorCount: 0, archived: false });
  saveOpsIndex(idx);

  // Save current op before switching away
  saveCurrentOperation();
  clearMapLayersForOpSwitch();

  currentOpId = id;
  currentOpName = name;
  subjects = []; sectors = []; roster = []; incidentLog = [];
  waypoints = []; sarMarkers2 = {}; clueMarkers = []; searchStartTime = null;
  saveCurrentOperation();
  localStorage.setItem('aprs_tracker_active_op_id', id);
  logEvent('Operation created: ' + name);
  toast('New operation: ' + name);
  if (curTab === 'log' || curTab === 'sarops') renderTabInto(curTab,'tcont');
}

function switchOperation(opId) {
  if (opId === currentOpId) return;
  saveCurrentOperation();
  clearMapLayersForOpSwitch();

  var idx = opsIndex();
  var entry = idx.find(function(o){ return o.id === opId; });
  if (!entry) { toast('Operation not found'); return; }

  currentOpId = opId;
  currentOpName = entry.name;
  loadOperationData(opId);
  redrawOperationOnMap();
  localStorage.setItem('aprs_tracker_active_op_id', opId);
  toast('Switched to: ' + entry.name);
  renderTabInto(curTab,'tcont');
}

function renameOperation(opId, newName) {
  newName = (newName || '').trim();
  if (!newName) return;
  var idx = opsIndex();
  var entry = idx.find(function(o){ return o.id === opId; });
  if (entry) {
    entry.name = newName;
    saveOpsIndex(idx);
    if (opId === currentOpId) currentOpName = newName;
    renderTabInto('operations','tcont');
  }
}

function archiveOperation(opId) {
  var idx = opsIndex();
  var entry = idx.find(function(o){ return o.id === opId; });
  if (!entry) return;
  entry.archived = !entry.archived;
  saveOpsIndex(idx);
  renderTabInto('operations','tcont');
  toast(entry.archived ? 'Operation archived' : 'Operation restored');
}

function deleteOperation(opId) {
  var idx = opsIndex();
  var entry = idx.find(function(o){ return o.id === opId; });
  if (!entry) return;
  if (!confirm('Permanently delete "' + entry.name + '" and all its data? This cannot be undone.')) return;
  localStorage.removeItem(OPS_DATA_PREFIX + opId);
  idx = idx.filter(function(o){ return o.id !== opId; });
  saveOpsIndex(idx);
  if (opId === currentOpId) {
    // Fall back to another op, or create a fresh default
    if (idx.length) {
      switchOperation(idx[0].id);
    } else {
      createOperation('Default');
    }
  }
  renderTabInto('operations','tcont');
  toast('Operation deleted');
}

function initOperations() {
  var idx = opsIndex();
  var lastActiveId = localStorage.getItem('aprs_tracker_active_op_id');
  if (!idx.length) {
    // First run: nothing to migrate, just create a fresh Default operation
    createOperation('Default');
  } else {
    var entry = idx.find(function(o){ return o.id === lastActiveId; }) || idx[0];
    currentOpId = entry.id;
    currentOpName = entry.name;
    loadOperationData(entry.id);
    redrawOperationOnMap();
  }
  loadKitLists();
}

// HTML-escapes any string before it's concatenated into an innerHTML
// string. MUST be used around every user-typed or remote-sourced field
// (subject/sector/roster names, log text, APRS message text/callsigns,
// etc.) before it's rendered -- without this, a crafted name or
// message (including ones received from other stations over the public
// APRS-IS network, not just local input) can inject and execute
// arbitrary script in the page.
function htmlEscape(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function ddToDMS(lat, lon) {
  function conv(val, isLat) {
    var dir = val >= 0 ? (isLat ? 'N' : 'E') : (isLat ? 'S' : 'W');
    val = Math.abs(val);
    var d = Math.floor(val);
    var mFull = (val - d) * 60;
    var m = Math.floor(mFull);
    var s = ((mFull - m) * 60).toFixed(2);
    return d + '\u00B0' + m + '\u2032' + s + '\u2033 ' + dir;
  }
  return conv(lat, true) + '  ' + conv(lon, false);
}

function ddToDDM(lat, lon) {
  function conv(val, isLat) {
    var dir = val >= 0 ? (isLat ? 'N' : 'E') : (isLat ? 'S' : 'W');
    val = Math.abs(val);
    var d = Math.floor(val);
    var m = ((val - d) * 60).toFixed(3);
    return d + '\u00B0 ' + m + '\u2032 ' + dir;
  }
  return conv(lat, true) + '  ' + conv(lon, false);
}

// Simplified UTM conversion (WGS84)
function ddToUTM(lat, lon) {
  var a = 6378137.0, eccSq = 0.00669438;
  var k0 = 0.9996;
  var zone = Math.floor((lon + 180) / 6) + 1;
  var lonOrigin = (zone - 1) * 6 - 180 + 3;
  var latRad = lat * Math.PI / 180;
  var lonRad = lon * Math.PI / 180;
  var lonOriginRad = lonOrigin * Math.PI / 180;
  var eccPrimeSq = eccSq / (1 - eccSq);
  var N = a / Math.sqrt(1 - eccSq * Math.sin(latRad) * Math.sin(latRad));
  var T = Math.tan(latRad) * Math.tan(latRad);
  var C = eccPrimeSq * Math.cos(latRad) * Math.cos(latRad);
  var A = Math.cos(latRad) * (lonRad - lonOriginRad);
  var M = a * ((1 - eccSq/4 - 3*eccSq*eccSq/64 - 5*Math.pow(eccSq,3)/256) * latRad
    - (3*eccSq/8 + 3*eccSq*eccSq/32 + 45*Math.pow(eccSq,3)/1024) * Math.sin(2*latRad)
    + (15*eccSq*eccSq/256 + 45*Math.pow(eccSq,3)/1024) * Math.sin(4*latRad)
    - (35*Math.pow(eccSq,3)/3072) * Math.sin(6*latRad));
  var easting = k0*N*(A + (1-T+C)*Math.pow(A,3)/6
    + (5-18*T+T*T+72*C-58*eccPrimeSq)*Math.pow(A,5)/120) + 500000.0;
  var northing = k0*(M + N*Math.tan(latRad)*(A*A/2 + (5-T+9*C+4*C*C)*Math.pow(A,4)/24
    + (61-58*T+T*T+600*C-330*eccPrimeSq)*Math.pow(A,6)/720));
  if (lat < 0) northing += 10000000.0;
  var hemi = lat >= 0 ? 'N' : 'S';
  return zone + hemi + ' ' + Math.round(easting) + 'E ' + Math.round(northing) + 'N';
}

function parseDMS(str) {
  // Parses formats like "38 30 15 N" or "38.5042 -77.4667" or DDM
  str = str.trim();
  // Try plain decimal pair first: "38.5, -77.46"
  var dd = str.match(/^(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)$/);
  if (dd) return { lat: parseFloat(dd[1]), lon: parseFloat(dd[2]) };

  // Try DMS with direction letters
  var re = /(\d+)[°\s]+(\d+)['\u2032\s]+([\d.]+)["\u2033]?\s*([NSEW])/gi;
  var matches = [];
  var m;
  while ((m = re.exec(str)) !== null) matches.push(m);
  if (matches.length === 2) {
    function toDD(mm) {
      var v = parseFloat(mm[1]) + parseFloat(mm[2])/60 + parseFloat(mm[3])/3600;
      if (mm[4].toUpperCase() === 'S' || mm[4].toUpperCase() === 'W') v = -v;
      return v;
    }
    return { lat: toDD(matches[0]), lon: toDD(matches[1]) };
  }
  return null;
}

function runCoordConvert() {
  var input = document.getElementById('cc-input').value.trim();
  var parsed = parseDMS(input);
  if (!parsed) { toast('Could not parse coordinates. Try "38.5, -77.46" or DMS format.'); return; }

  + '<div class="result-box"><div class="rk">DEGREES DEC MIN</div><div class="rv" style="font-size:12px">' + ddToDDM(lat,lon) + '</div></div>'
  + '<div class="result-box"><div class="rk">UTM</div><div class="rv" style="font-size:12px">' + ddToUTM(lat,lon) + '</div></div>'

}

// ── Maidenhead Grid Square ───────────────────────────────────────────
function latLonToMaidenhead(lat, lon) {
  lon += 180; lat += 90;
  var field_lon = String.fromCharCode(65 + Math.floor(lon / 20));
  var field_lat = String.fromCharCode(65 + Math.floor(lat / 10));
  var sq_lon    = String(Math.floor((lon % 20) / 2));
  var sq_lat    = String(Math.floor(lat % 10));
  var sub_lon   = String.fromCharCode(65 + Math.floor((lon % 2) / (2/24)));
  var sub_lat   = String.fromCharCode(65 + Math.floor((lat % 1) / (1/24)));
  return field_lon + field_lat + sq_lon + sq_lat + sub_lon.toLowerCase() + sub_lat.toLowerCase();
}

// ── MGRS Converter (simplified WGS84 UTM zone) ───────────────────────
function latLonToMGRS(lat, lon) {
  // Get UTM zone
  var zone = Math.floor((lon + 180) / 6) + 1;
  var band = 'CDEFGHJKLMNPQRSTUVWXX'.charAt(Math.floor((lat + 80) / 8));
  // Simplified - show UTM zone + band + easting/northing at 1m precision
  var a = 6378137, f = 1/298.257223563;
  var b = a * (1 - f);
  var e2 = (a*a - b*b) / (a*a);
  var k0 = 0.9996;
  var lonRad = lon * Math.PI / 180;
  var latRad = lat * Math.PI / 180;
  var lon0   = (zone - 1) * 6 - 180 + 3;
  var lon0Rad = lon0 * Math.PI / 180;
  var N = a / Math.sqrt(1 - e2 * Math.sin(latRad) * Math.sin(latRad));
  var T = Math.tan(latRad) * Math.tan(latRad);
  var C = e2 / (1 - e2) * Math.cos(latRad) * Math.cos(latRad);
  var A = Math.cos(latRad) * (lonRad - lon0Rad);
  var M = a * ((1 - e2/4 - 3*e2*e2/64) * latRad
    - (3*e2/8 + 3*e2*e2/32) * Math.sin(2*latRad)
    + (15*e2*e2/256) * Math.sin(4*latRad));
  var easting  = k0 * N * (A + (1-T+C)*A*A*A/6) + 500000;
  var northing = k0 * (M + N * Math.tan(latRad) * (A*A/2 + (5-T+9*C)*A*A*A*A/24));
  if (lat < 0) northing += 10000000;
  // MGRS 100km square ID (simplified GZD)
  var e100k = Math.floor(easting / 100000) % 8;
  var n100k = Math.floor(northing / 100000) % 20;
  var eSq = 'ABCDEFGH'.charAt(e100k);
  var nSq = (zone % 2 === 0) ? 'FGHJKLMNPQRSTUVABCDE'.charAt(n100k) : 'ABCDEFGHJKLMNPQRSTU'.charAt(n100k % 20);
  var eRem = Math.floor(easting % 100000).toString().padStart(5,'0');
  var nRem = Math.floor(northing % 100000).toString().padStart(5,'0');
  return zone + band + ' ' + eSq + nSq + ' ' + eRem + ' ' + nRem;
}

// ── Magnetic Declination ─────────────────────────────────────────────
var cachedDeclination = null;
var cachedDeclLat = null, cachedDeclLon = null;

async function fetchMagneticDeclination(lat, lon) {
  if (cachedDeclLat === lat && cachedDeclLon === lon && cachedDeclination !== null) return cachedDeclination;
  try {
    var yr = new Date().getFullYear();
    var r = await fetch('https://www.ngdc.noaa.gov/geomag-web/calculators/calculateDeclination?lat1=' + lat + '&lon1=' + lon + '&resultFormat=json&startYear=' + yr + '&startMonth=1&startDay=1');
    if (!r.ok) return null;
    var d = await r.json();
    var decl = d.result && d.result[0] && d.result[0].declination;
    cachedDeclination = decl != null ? parseFloat(decl.toFixed(1)) : null;
    cachedDeclLat = lat; cachedDeclLon = lon;
    return cachedDeclination;
  } catch(e) { return null; }
}

function haversine(lat1, lon1, lat2, lon2) {
  var R = 6371; // km
  var dLat = (lat2-lat1) * Math.PI/180;
  var dLon = (lon2-lon1) * Math.PI/180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)*Math.sin(dLon/2);
  var c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function bearing(lat1, lon1, lat2, lon2) {
  var dLon = (lon2-lon1) * Math.PI/180;
  var y = Math.sin(dLon) * Math.cos(lat2*Math.PI/180);
  var x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) -
    Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos(dLon);
  var brng = Math.atan2(y, x) * 180/Math.PI;
  return (brng + 360) % 360;
}

function compassDir(deg) {
  var dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg/22.5) % 16];
}

function runDistanceBearing() {
  var p1 = parseDMS(document.getElementById('db-p1').value.trim());
